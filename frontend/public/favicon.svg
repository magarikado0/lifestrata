<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景: 角丸正方形 -->
  <rect width="512" height="512" rx="112" fill="#FDF6E8"/>

  <!-- 地層レイヤー: 下から上へ幅が狭くなる -->

  <!-- Bottom layer -->
  <rect x="56" y="324" width="400" height="52" rx="26" fill="#1a1a1a"/>

  <!-- Middle layer -->
  <rect x="128" y="248" width="256" height="52" rx="26" fill="#1a1a1a" opacity="0.4"/>

  <!-- Top layer: アンバー（頂点） -->
  <rect x="188" y="172" width="136" height="52" rx="26" fill="#F9A825"/>
</svg>
